<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>iOS KPDS 진행 현황 보드</title>
<style>
  :root {
    --bg: #eef7fb;
    --panel: #f7fbfd;
    --ink: #183247;
    --muted: #6f8da3;
    --line: #d8e6ef;
    --bar: #71b7d6;
    --bar-soft: #dceff8;
    --ok: #69b7a0;
    --warn: #d9a56a;
    --shadow: 0 18px 50px rgba(56, 102, 140, 0.12);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(113,183,214,0.22), transparent 28%),
      linear-gradient(180deg, #f7fcff 0%, var(--bg) 100%);
  }
  .page {
    width: min(1280px, calc(100vw - 48px));
    margin: 32px auto 72px;
  }
  .hero {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }
  .panel {
    background: rgba(247,251,253,0.88);
    border: 1px solid rgba(216,230,239,0.82);
    border-radius: 28px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
  }
  .hero-copy {
    padding: 32px;
  }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  h1 {
    margin: 0 0 14px;
    font-size: clamp(36px, 4vw, 60px);
    line-height: 0.95;
    letter-spacing: -0.05em;
  }
  .sub {
    margin: 0;
    color: var(--muted);
    font-size: 16px;
    line-height: 1.6;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 24px;
  }
  .stat {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(216,230,239,0.68);
    border-radius: 18px;
    padding: 16px;
  }
  .stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
  .stat-value { margin-top: 8px; font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .chart-panel {
    padding: 26px 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .chart-title { margin: 0 0 20px; font-size: 15px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
  .bars {
    width: 100%;
    display: grid;
    gap: 16px;
  }
  .bar-row {
    display: grid;
    grid-template-columns: 156px 1fr 64px;
    align-items: center;
    gap: 14px;
  }
  .bar-label {
    min-height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-weight: 600;
  }
  .track {
    height: 18px;
    background: var(--bar-soft);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #d98a5c 0%, var(--bar) 100%);
  }
  .bar-value {
    min-height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .modules {
    display: grid;
    gap: 16px;
  }
  details.module,
  .module-static {
    border-radius: 24px;
    border: 1px solid rgba(216,230,239,0.82);
    background: rgba(247,251,253,0.88);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  details.module[open],
  .module-static { background: rgba(255, 253, 248, 0.94); }
  summary {
    list-style: none;
    cursor: pointer;
    position: relative;
    padding: 22px 76px 22px 24px;
  }
  summary::-webkit-details-marker { display: none; }
  summary::before {
    content: "";
    position: absolute;
    right: 35px;
    top: 50%;
    width: 10px;
    height: 10px;
    border-top: 2px solid var(--muted);
    border-right: 2px solid var(--muted);
    transform: translateY(-50%) rotate(45deg);
    transform-origin: center;
    transition: transform 0.18s ease;
    z-index: 1;
  }
  summary::after {
    content: "";
    position: absolute;
    right: 24px;
    top: 50%;
    width: 32px;
    height: 32px;
    border-radius: 999px;
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(216,230,239,0.9);
    box-shadow: 0 8px 18px rgba(56, 102, 140, 0.12);
    transform: translateY(-50%);
  }
  details.module[open] summary::before {
    transform: translateY(-50%) rotate(135deg);
  }
  .module-head {
    display: grid;
    grid-template-columns: minmax(280px, 1fr) 64px minmax(260px, 360px) 104px 20px minmax(88px, 140px);
    gap: 10px;
    align-items: center;
  }
  .module-static-head {
    padding: 22px 76px 22px 24px;
  }
  .module-copy {
    min-width: 0;
    display: grid;
    gap: 4px;
  }
  .module-title { font-size: 22px; font-weight: 700; }
  .module-meta {
    display: flex;
    align-items: center;
    gap: 18px;
    min-width: 0;
    color: var(--muted);
    font-size: 13px;
    white-space: nowrap;
  }
  .ticket {
    color: var(--muted);
    font-size: 13px;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .percent {
    justify-self: end;
    width: 64px;
    text-align: right;
    font-size: 28px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .mini-track {
    width: 100%;
    height: 12px;
    background: var(--bar-soft);
    border-radius: 999px;
    overflow: hidden;
  }
  .module-head > .mini-track {
    width: calc(100% - 12px);
    justify-self: start;
  }
  .mini-fill { height: 100%; background: linear-gradient(90deg, #d98a5c 0%, var(--bar) 100%); }
  .module-summary {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .module-badge {
    justify-self: stretch;
    transform: translateX(-12px);
  }
  .module-avatar {
    justify-self: start;
    transform: translateX(-12px);
  }
  .module-assignee {
    justify-self: start;
    width: auto;
    text-align: left;
    white-space: nowrap;
    transform: translateX(-12px);
  }
  .child-badge {
    justify-self: stretch;
  }
  .child-avatar {
    justify-self: start;
  }
  .child-assignee {
    justify-self: start;
    width: auto;
    text-align: left;
    white-space: nowrap;
  }
  .module-body {
    padding: 0 24px 24px;
    display: block;
    border-top: 1px solid rgba(216,230,239,0.74);
  }
  .child-list {
    padding-top: 20px;
    display: grid;
    gap: 12px;
    max-height: 816px;
    overflow-y: auto;
    padding-right: 18px;
    scrollbar-gutter: stable both-edges;
  }
  .child-list::-webkit-scrollbar {
    width: 10px;
  }
  .child-list::-webkit-scrollbar-track {
    background: rgba(220,239,248,0.9);
    border-radius: 999px;
  }
  .child-list::-webkit-scrollbar-thumb {
    background: rgba(113,183,214,0.8);
    border-radius: 999px;
  }
  .child {
    display: grid;
    grid-template-columns: minmax(280px, 1fr) 64px minmax(260px, 360px) 104px 20px minmax(88px, 140px);
    gap: 16px;
    align-items: center;
    padding: 14px 16px;
    border-radius: 18px;
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(216,230,239,0.68);
  }
  .child-copy { display: grid; gap: 4px; min-width: 0; }
  .child-name {
    font-weight: 600;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .child-meta { color: var(--muted); font-size: 12px; }
  .child-empty { padding: 18px 20px; border-radius: 18px; background: rgba(255,255,255,0.72); border: 1px dashed rgba(216,230,239,0.8); color: var(--muted); }
  .child-pct {
    justify-self: end;
    width: 64px;
    text-align: right;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .avatar {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    aspect-ratio: 1 / 1;
    border-radius: 999px;
    overflow: hidden;
    flex: 0 0 20px;
    background: rgba(220,239,248,0.9);
  }
  .avatar img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .avatar-fallback {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    color: #4f7890;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0;
    background: linear-gradient(180deg, #e8f4fa 0%, #dceff8 100%);
  }
  .avatar-icon {
    width: 12px;
    height: 12px;
    display: block;
  }
  .avatar-icon path {
    fill: #5f7d92;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 104px;
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .assignee {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .done { background: rgba(45,127,94,0.12); color: var(--ok); }
  .progress { background: rgba(113,183,214,0.16); color: var(--bar); }
  .review { background: rgba(122, 169, 214, 0.18); color: #4d7da8; }
  .qa { background: rgba(105,183,160,0.18); color: #4f8f7c; }
  .blocked { background: rgba(217,165,106,0.18); color: var(--warn); }
  .todo { background: rgba(111,141,163,0.16); color: var(--muted); }
  @media (max-width: 980px) {
    .hero { grid-template-columns: 1fr; }
    .module-head { grid-template-columns: 1fr; }
    .child { grid-template-columns: 1fr; }
    .bar-row { grid-template-columns: 132px 1fr 56px; }
    .stats { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

        "statusLabel": "대기",
        "assignee": "Unassigned"
      },
      {

      },

      },
      {

      },
      {

  {
    "name": "AI Guide",
    "ticket": "KMA-7031",
    "parentStatus": "review",
    "parentStatusLabel": "REVIEW",
    "parentAssignee": "조태형",
    "generatePreviewChildren": false,
    "progress": 0,
    "done": 0,
    "remaining": 0,
    "inProgress": 0,
    "blocked": 0,
    "total": 0,
    "children": []
  }
];

const overallBars = document.getElementById('overall-bars');
const modulesRoot = document.getElementById('modules');
const previewTargetChildCount = 24;
const previewAssignees = ["조태형", "김민수", "박서연", "이준호", "최유진"];
const previewStatusLabelByStatus = {
  todo: "해야 할 일",
  progress: "진행 중",
  review: "REVIEW",
  qa: "QA",
  done: "DONE",
  blocked: "차단"
};
const previewProgressByStatus = {
  todo: 0,
  progress: 45,
  review: 70,
  qa: 90,
  done: 100,
  blocked: 15
};
const previewStatuses = [
  { status: "todo", statusLabel: "해야 할 일", progress: previewProgressByStatus.todo },
  { status: "progress", statusLabel: "진행 중", progress: previewProgressByStatus.progress },
  { status: "review", statusLabel: "REVIEW", progress: previewProgressByStatus.review },
  { status: "qa", statusLabel: "QA", progress: previewProgressByStatus.qa },
  { status: "done", statusLabel: "DONE", progress: previewProgressByStatus.done }
];

function assigneeLabel(value) {
  return value || "Unassigned";
}

function assigneeAvatarMarkup(assignee, avatarUrl = "") {
  const label = assigneeLabel(assignee);
  if (avatarUrl) {
    return `<span class="avatar"><img src="${avatarUrl}" alt="${label}"></span>`;
  }

  return `<span class="avatar"><span class="avatar-fallback"><svg class="avatar-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12.25a4.25 4.25 0 1 0 0-8.5 4.25 4.25 0 0 0 0 8.5Zm0 1.75c-4.1 0-7.5 2.23-7.5 4.94 0 .45.37.81.81.81H18.7c.45 0 .8-.36.8-.8 0-2.72-3.4-4.95-7.5-4.95Z"/></svg></span></span>`;
}

modules.forEach((item, moduleIndex) => {
  item.parentStatus = item.parentStatus || "todo";
  item.parentStatusLabel = item.parentStatusLabel || previewStatusLabelByStatus[item.parentStatus] || item.parentStatus;
  item.children = item.children.map((child) => ({
    ...child,
    progress: previewProgressByStatus[child.status] ?? child.progress,
    statusLabel: previewStatusLabelByStatus[child.status] ?? child.statusLabel
  }));

  while ((item.generatePreviewChildren ?? true) && item.children.length < previewTargetChildCount) {
    const count = item.children.length + 1;
    const status = previewStatuses[(count + moduleIndex) % previewStatuses.length];
    item.children.push({
      key: `KMA-${8000 + moduleIndex * 100 + count}`,
      name: `${item.name.replace(/\s*\(.+\)/, "")} Preview SubTicket ${count}`,
      progress: status.progress,
      status: status.status,
      statusLabel: status.statusLabel,
      assignee: previewAssignees[(count + moduleIndex) % previewAssignees.length]
    });
  }

  item.parentAssignee = item.parentAssignee
    || item.children.find((child) => assigneeLabel(child.assignee) !== "Unassigned")?.assignee
    || "Unassigned";

  item.total = item.children.length;
  item.done = item.children.filter((child) => child.status === "done").length;
  item.inProgress = item.children.filter((child) => ["progress", "review", "qa"].includes(child.status)).length;
  item.blocked = item.children.filter((child) => child.status === "blocked").length;
  item.remaining = item.total - item.done;

  if (item.total > 0) {
    item.progress = Math.round(item.children.reduce((sum, child) => sum + child.progress, 0) / item.total);
    return;
  }

  // When a parent task has no subtasks, fall back to the task status itself.
  item.total = 1;
  item.done = item.parentStatus === "done" ? 1 : 0;
  item.inProgress = ["progress", "review", "qa"].includes(item.parentStatus) ? 1 : 0;
  item.blocked = item.parentStatus === "blocked" ? 1 : 0;
  item.remaining = item.done ? 0 : 1;
  item.progress = previewProgressByStatus[item.parentStatus] ?? 0;
});

modules.forEach((item, index) => {
  overallBars.insertAdjacentHTML('beforeend', `
    <div class="bar-row">
      <div class="bar-label">${item.name}</div>
      <div class="track"><div class="fill" style="width:${item.progress}%"></div></div>
      <div class="bar-value">${item.progress}%</div>
    </div>
  `);

  const children = item.children.length ? item.children.map(child => `
    <div class="child">
      <div class="child-copy">
        <div class="child-name">${child.name}</div>
        <div class="child-meta">${child.key}</div>
      </div>
      <div class="child-pct">${child.progress}%</div>
      <div class="mini-track"><div class="mini-fill" style="width:${child.progress}%"></div></div>
      <div class="badge child-badge ${child.status}">${child.statusLabel || previewStatusLabelByStatus[child.status] || child.status}</div>
      <div class="child-avatar">
        ${assigneeAvatarMarkup(child.assignee, child.avatarUrl)}
      </div>
      <div class="assignee child-assignee">${assigneeLabel(child.assignee)}</div>
    </div>
  `).join('') : '';

  modulesRoot.insertAdjacentHTML('beforeend', `
    ${item.children.length ? `
    <details class="module" ${index < 2 ? 'open' : ''}>
      <summary>
        <div class="module-head">
          <div class="module-copy">
            <div class="module-title">${item.name}</div>
            <div class="module-meta">
              <span class="ticket">${item.ticket}</span>
              <span class="ticket module-summary">( 전체 ${item.total} / 완료 ${item.done} / 잔여 ${item.remaining} )</span>
            </div>
          </div>
          <div class="percent">${item.progress}%</div>
          <div class="mini-track"><div class="mini-fill" style="width:${item.progress}%"></div></div>
          <div class="badge module-badge ${item.parentStatus}">${item.parentStatusLabel}</div>
          <div class="module-avatar">
            ${assigneeAvatarMarkup(item.parentAssignee, item.parentAvatarUrl)}
          </div>
          <div class="assignee module-assignee">${assigneeLabel(item.parentAssignee)}</div>
        </div>
      </summary>
      <div class="module-body">
        <div class="child-list">${children}</div>
      </div>
    </details>` : `
    <section class="module-static">
      <div class="module-static-head">
        <div class="module-head">
          <div class="module-copy">
            <div class="module-title">${item.name}</div>
            <div class="module-meta">
              <span class="ticket">${item.ticket}</span>
              <span class="ticket module-summary">( 전체 ${item.total} / 완료 ${item.done} / 잔여 ${item.remaining} )</span>
            </div>
          </div>
          <div class="percent">${item.progress}%</div>
          <div class="mini-track"><div class="mini-fill" style="width:${item.progress}%"></div></div>
          <div class="badge module-badge ${item.parentStatus}">${item.parentStatusLabel}</div>
          <div class="module-avatar">
            ${assigneeAvatarMarkup(item.parentAssignee, item.parentAvatarUrl)}
          </div>
          <div class="assignee module-assignee">${assigneeLabel(item.parentAssignee)}</div>
        </div>
      </div>
    </section>`}
  `);
});
</script>
